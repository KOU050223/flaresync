pre-commit:
  parallel: true
  commands:
    lint:
      glob: "**/*.{ts,mts,cts,mjs}"
      run: pnpm eslint {staged_files}
    format:
      glob: "**/*.{ts,mts,cts,mjs,json}"
      run: pnpm prettier --write {staged_files} && git add {staged_files}

pre-push:
  parallel: true
  commands:
    test:
      run: pnpm --filter flaresync test
    knip:
      run: pnpm knip
